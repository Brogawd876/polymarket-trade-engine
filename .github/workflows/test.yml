name: Test

on:
  push:
    branches: [master]
    paths-ignore:
      - '**/*.md'
  pull_request:
    branches: [master]
    paths-ignore:
      - '**/*.md'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run isolated orderbook tests
        run: bun test --max-concurrency=1 test/tracker/orderbook.test.ts

      - name: Run remaining tests
        run: |
          bun test --max-concurrency=1 $(git ls-files '*test.ts' '*test.tsx' | grep -v '^test/tracker/orderbook.test.ts$')
